<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Rakh-Rakhaav Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: system-ui, sans-serif;
        background: linear-gradient(180deg, #f8faff, #eaf0ff);
        color: #0f172a;
      }

      .card {
        max-width: 420px;
        width: 100%;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 24px;
        box-shadow: 0 22px 48px rgba(15, 23, 42, 0.1);
        padding: 28px;
        text-align: center;
      }

      .logo {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        margin: 0 auto 18px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #475569;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/icon-192.png" alt="Rakh-Rakhaav" />
      <h1>You are offline</h1>
      <p>Internet wapas aane par app phir se normal kaam karega. Kuch pages aur assets cache se chalenge.</p>
    </div>
  </body>
</html>
