<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" 
    content="width=device-width, initial-scale=1" />
  <title>Rakhaav — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0B1D35;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #059669, #1A3F6F);
      border-radius: 16px;
      display: flex; align-items: center;
      justify-content: center;
      font-size: 28px; font-weight: 900;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 22px; font-weight: 800;
      margin-bottom: 8px;
    }
    h1 span { color: #10B981; }
    .status {
      background: #dc2626;
      color: #fff;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 24px;
      display: inline-block;
    }
    p {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      max-width: 300px;
      margin-bottom: 32px;
    }
    .info-box {
      background: rgba(5,150,105,0.12);
      border: 1px solid rgba(5,150,105,0.3);
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 320px;
      margin-bottom: 32px;
      text-align: left;
    }
    .info-box div {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .info-box div:last-child { margin-bottom: 0; }
    .retry-btn {
      background: #059669;
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      max-width: 320px;
    }
    .note {
      margin-top: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="logo">र</div>
  <h1>रख<span>रखाव</span></h1>
  <div class="status">🔴 No Internet</div>
  <p>
    Internet connection nahi hai.<br/>
    Aapka offline data safe hai —
    internet aane pe automatically sync hoga.
  </p>
  <div class="info-box">
    <div>✅ Saved data safe hai</div>
    <div>✅ Internet aane pe auto-sync hoga</div>
    <div>✅ Koi data lost nahi hoga</div>
    <div>⚠️ Abhi naya record nahi kar sakte</div>
  </div>
  <button class="retry-btn" onclick="window.location.reload()">
    🔄 Retry — Internet Check Karo
  </button>
  <div class="note">
    Pehle internet on karo, phir retry karo
  </div>
</body>
</html>
